name: ARKidsWorld
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  lottie: ^3.3.2
  material_design_icons_flutter: ^7.0.7296
  persistent_bottom_nav_bar: ^6.2.1
  get: ^4.7.3
  url_launcher: ^6.2.1
  easy_localization: ^3.0.8

  # State Management
  flutter_bloc: ^8.1.3

  # Networking
  dio: ^5.3.3
  internet_connection_checker: ^1.0.0+1

  #Local Storage
  shared_preferences: ^2.5.5
  hive_flutter: ^1.1.0

  # Dependency Injection
  get_it: ^7.6.4

  # Navigation
  go_router: ^13.0.0

  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1

  # Image Picker
  image_picker: ^1.0.5

  # Cached Network Image
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # Supabase
  supabase_flutter: ^2.12.2

  # State Management
  provider: ^6.1.1

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # Internationalization
flutter_localizations:
    sdk: flutter
intl: ^0.20.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  # Translate
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/Welcome.json
    - assets/language/
  fonts:
    - family: Harlow
      fonts:
        - asset: assets/fonts/Harlow-Solid-Italic/HARLOWSI.TTF
    - family: Revania
      fonts:
        - asset: assets/fonts/Revania-Regular/Revania.ttf
    - family: KingThings
      fonts:
          - asset: assets/fonts/kingthings_exeter/Kingthings Exeter.ttf
    - family: BerkshireSwash
      fonts:
        - asset: assets/fonts/berkshire-swash/BerkshireSwash-Regular.ttf
